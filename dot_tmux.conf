# --- Display & Colors ---
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",alacritty:Tc"

# --- Core Settings & QoL Features ---
unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 0
set-option -g focus-events on
bind-key C-a send-prefix
set-option -s escape-time 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g history-limit 50000
set-option -g status-position top
set -g mouse on

# --- Window & Pane Management ---
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# --- Vi Mode & Copying ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Utility Binds ---
bind r source-file ~/.tmux.conf \; display "Tmux Reloaded!"
bind o run-shell "open '#{pane_current_path}'"
bind -r e kill-pane -a

# --- Custom Gruvbox Glassmorphism Theme ---
# bg=default allows Alacritty's frosted glass to bleed through
set -g status-style bg=default,fg="#ebdbb2"
set -g status-left-length 50
set -g status-right-length 50

# Active window (Burnt Orange)
set -g window-status-current-format "#[fg=#282828,bg=#d65d0e,bold] #I: #W "
# Inactive window (Muted Dark Gray)
set -g window-status-format "#[fg=#ebdbb2,bg=#504945] #I: #W "

# Session name on the left (Gruvbox Yellow)
set -g status-left "#[fg=#282828,bg=#fabd2f,bold] #S #[bg=default]  "
# Date and time on the right (Burnt Orange)
set -g status-right "#[fg=#d65d0e] %Y-%m-%d %H:%M "

# Pane borders
set -g pane-border-style fg="#504945"
set -g pane-active-border-style fg="#d65d0e"

# --- Plugin Configuration ---
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @vim_navigator_mapping_left "C-Left C-h"  
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
