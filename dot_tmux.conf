# --- Display & Colors ---
# Enable true color (24-bit) support specifically for Alacritty
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",alacritty:Tc"

# --- Core Settings & QoL Features ---
# action key
unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 0
set-option -g focus-events on
bind-key C-a send-prefix

# Zero delay for Neovim Escape key
set-option -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Auto-renumber windows when one is closed
set-option -g renumber-windows on

# Increase scrollback history
set-option -g history-limit 50000

# Move status bar to the top (looks much cleaner when using Neovim)
set-option -g status-position top

# enable mouse support
set -g mouse on

# --- Window & Pane Management ---
# Open panes in current directory
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# pane resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# --- Vi Mode & Copying ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Utility Binds ---
# Reload settings
bind r source-file ~/.tmux.conf \; display "Tmux Reloaded!"
# Open current directory
bind o run-shell "open '#{pane_current_path}'"
bind -r e kill-pane -a

# --- Custom Kanagawa Glassmorphism Theme ---
# We set bg=default so the Alacritty frosted glass effect bleeds through
set -g status-style bg=default,fg="#dcd7ba"
set -g status-left-length 50
set -g status-right-length 50

# Active window (Spring Green)
set -g window-status-current-format "#[fg=#1f1f28,bg=#98bb6c,bold] #I: #W "
# Inactive window (Muted Dark Gray)
set -g window-status-format "#[fg=#dcd7ba,bg=#2a2a37] #I: #W "

# Session name on the left (Crystal Blue)
set -g status-left "#[fg=#1f1f28,bg=#7e9cd8,bold] #S #[bg=default]  "
# Date and time on the right (Spring Green)
set -g status-right "#[fg=#98bb6c] %Y-%m-%d %H:%M "

# Pane borders
set -g pane-border-style fg="#2a2a37"
set -g pane-active-border-style fg="#98bb6c"

# --- Plugin Configuration ---
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @vim_navigator_mapping_left "C-Left C-h"  
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank' # Syncs tmux copies to system clipboard

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
