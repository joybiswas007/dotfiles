[window]
padding = { x = 12, y = 12 }
dynamic_padding = true

# Glassmorphism settings
opacity = 0.85
blur = true 

[font]
size = 11.5

[colors.primary]
background = '#1f1f28'
foreground = '#dcd7ba'

# Normal colors
[colors.normal]
black   = '#16161d'
red     = '#c34043'
green   = '#76946a'
yellow  = '#c0a36e'
blue    = '#7e9cd8'
magenta = '#957fb8'
cyan    = '#6a9589'
white   = '#c8c093'

# Bright colors
[colors.bright]
black   = '#727169'
red     = '#e82424'
green   = '#98bb6c'
yellow  = '#e6c384'
blue    = '#7fb4ca'
magenta = '#938aa9'
cyan    = '#7aa89f'
white   = '#dcd7ba'

[colors.cursor]
text   = '#1f1f28'
cursor = '#98bb6c'

[colors.selection]
text = '#c8c093'
background = '#2d4f67'
