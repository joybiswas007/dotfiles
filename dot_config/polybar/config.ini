;==========================================================
;
;   Retro Pac-Man Arcade Polybar Config
;
;==========================================================

[colors]
background = #0D0E12
background-alt = #1A1C23
foreground = #E2E4E9
primary = #FCE700
secondary = #00D7FF
alert = #FF0000
disabled = #505860
maze-blue = #0000D7

; Ghost Colors
ghost-red = #FF0000
ghost-pink = #FFB8FF
ghost-cyan = #00D7FF
ghost-orange = #FFB852

[bar/main]
bottom = true
width = 100%
height = 28pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 2pt
border-color = ${colors.maze-blue}

padding-left = 1
padding-right = 1

module-margin = 1

separator = "·"
separator-foreground = ${colors.maze-blue}

font-0 = "CaskaydiaCove NF:style=Regular:size=11;2"
font-1 = "CaskaydiaCove NF:style=Regular:size=13;3"
font-2 = "CaskaydiaCove NF:style=Regular:size=15;4"

modules-left = i3 pacman-updates
modules-center = date
modules-right = filesystem pulseaudio memory cpu battery wlan

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-maxsize = 16
tray-background = ${colors.background}

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-workspace-numbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

; Workspace display
; Focused: Pacman eating pellet
ws-icon-0 = 1;󰮯
ws-icon-1 = 2;󰊠
ws-icon-2 = 3;󰊠
ws-icon-3 = 4;󰊠
ws-icon-4 = 5;󰊠
ws-icon-5 = 6;⬝
ws-icon-6 = 7;⬝
ws-icon-7 = 8;󰊠
ws-icon-8 = 9;󰊠
ws-icon-9 = 10;
ws-icon-default = ⬝

label-focused = %icon% %name%
label-focused-foreground = ${colors.secondary}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.secondary}
label-focused-padding = 1

label-unfocused = %icon% %name%
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 1

; Color distinct ghosts on inactive workspaces if named
label-visible = %icon% %name%
label-visible-foreground = ${colors.secondary}
label-visible-padding = 1

label-urgent = %icon% %name%
label-urgent-foreground = ${colors.alert}
label-urgent-underline = ${colors.alert}
label-urgent-padding = 1

[module/pacman-updates]
type = custom/script
exec = checkupdates 2>/dev/null | wc -l || echo "0"
interval = 600
format-prefix = "󰮯 ⬝ "
format-prefix-foreground = ${colors.primary}
format = "<label>"
label = %output%
format-foreground = ${colors.secondary}
click-left = alacritty -e sudo pacman -Syu

[module/filesystem]
type = internal/filesystem
interval = 25
mount-0 = /
label-mounted =   %free%
label-mounted-foreground = ${colors.secondary}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}
label-muted = 󰝟 Muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.ghost-pink}
label = %gb_used% (%percentage_used%%)
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.ghost-cyan}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 99
low-at = 15

format-charging = <label-charging>
format-charging-prefix = "󱐋 ⚡ "
format-charging-prefix-foreground = ${colors.ghost-orange}
label-charging = %percentage%%
label-charging-foreground = ${colors.foreground}

format-discharging = <label-discharging>
format-discharging-prefix = "🔋 "
format-discharging-prefix-foreground = ${colors.primary}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full = <label-full>
format-full-prefix = "🔋 "
format-full-prefix-foreground = ${colors.primary}
label-full = %percentage%%
label-full-foreground = ${colors.ghost-cyan}

[module/wlan]
type = internal/network
interface = wlo1
interval = 5
format-connected = <label-connected>
format-connected-prefix = "󰊠  "
format-connected-prefix-foreground = ${colors.ghost-pink}
label-connected = %essid%
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰊠  "
format-disconnected-prefix-foreground = #0022FF
label-disconnected = Offline
label-disconnected-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %Y-%m-%d %H:%M:%S
label = "󱑂  %date%"
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
