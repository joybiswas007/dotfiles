conky.config = {
    -- Window placement & behavior
    alignment = 'top_right',
    gap_x = 40,
    gap_y = 60,
    minimum_width = 300,
    minimum_height = 5,
    
    -- i3 / Compositor settings to make it float seamlessly
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override', -- 'override' prevents i3 from trying to tile it
    own_window_transparent = true,
    own_window_argb_visual = true,
    
    -- Visuals & Performance
    double_buffer = true,
    no_buffers = true,
    update_interval = 2.0,
    use_xft = true,
    font = 'CaskaydiaCove NF:size=10',
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    
    -- Retro Arcade Colors (Note: Conky doesn't use the '#' symbol for hex codes)
    default_color = 'e2e4e9', -- Pellet White
    color1 = 'fce700',        -- Pac-Man Yellow (Headers)
    color2 = '00d7ff',        -- Inky Cyan (Progress Bars)
    color3 = 'ff0000',        -- Blinky Red (Highlights)
}

conky.text = [[
${color1}${font CaskaydiaCove NF:size=13:bold}󰮯 SYSTEM ${hr 2}${font}${color}
${voffset 5}OS: ${alignr}$sysname $kernel
Uptime: ${alignr}$uptime

${color1}${font CaskaydiaCove NF:size=13:bold}󰊠 CPU ${hr 2}${font}${color}
${voffset 5}Usage: ${cpu}%
${color2}${cpubar 8}${color}
Core 1: ${cpu cpu1}% ${alignr}Core 2: ${cpu cpu2}%
Core 3: ${cpu cpu3}% ${alignr}Core 4: ${cpu cpu4}%

${color1}${font CaskaydiaCove NF:size=13:bold}󰊠 MEMORY ${hr 2}${font}${color}
${voffset 5}RAM: $mem / $memmax
${color2}${membar 8}${color}
Swap: $swap / $swapmax
${color2}${swapbar 8}${color}

${color1}${font CaskaydiaCove NF:size=13:bold} DISK ${hr 2}${font}${color}
${voffset 5}Root: ${fs_used /} / ${fs_size /}
${color2}${fs_bar 8 /}${color}
]]
